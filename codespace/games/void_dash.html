<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> VoidDash 📝</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-cyan: #00f5ff;
    --neon-pink: #ff0080;
    --neon-yellow: #ffff00;
    --neon-green: #00ff88;
    --dark: #020408;
    --darker: #010205;
    --panel: rgba(0, 245, 255, 0.05);
    --border: rgba(0, 245, 255, 0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,245,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .scanline {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 600px;
    padding: 10px 20px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.5);
    font-family: 'Share Tech Mono', monospace;
  }

  .hud-value {
    font-size: 20px;
    font-weight: 900;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px rgba(0,245,255,0.4);
    font-family: 'Share Tech Mono', monospace;
  }

  .lives {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .heart {
    font-size: 18px;
    filter: drop-shadow(0 0 6px var(--neon-pink));
    transition: all 0.3s;
  }

  .heart.dead {
    filter: none;
    opacity: 0.2;
  }

  .level-bar-wrap {
    width: 120px;
  }

  .level-bar {
    height: 4px;
    background: rgba(0,245,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }

  .level-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
    box-shadow: 0 0 8px var(--neon-cyan);
    border-radius: 2px;
    transition: width 0.3s;
  }

  canvas {
    display: block;
    border: 1px solid var(--border);
    box-shadow:
      0 0 30px rgba(0,245,255,0.1),
      inset 0 0 30px rgba(0,0,0,0.5),
      0 0 60px rgba(0,245,255,0.05);
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    cursor: none;
  }

  .overlay {
    position: absolute;
    top: 36px;
    width: 600px;
    height: 500px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    background: rgba(2,4,8,0.92);
    z-index: 10;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .overlay.hidden { display: none; }

  .overlay-title {
    font-size: 52px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-pink));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    animation: pulse-glow 2s ease-in-out infinite;
  }

  .overlay-sub {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(0,245,255,0.6);
    font-family: 'Share Tech Mono', monospace;
    text-align: center;
  }

  .overlay-score {
    font-size: 32px;
    font-weight: 700;
    color: var(--neon-yellow);
    text-shadow: 0 0 20px var(--neon-yellow);
    font-family: 'Share Tech Mono', monospace;
  }

  .btn {
    padding: 14px 48px;
    background: transparent;
    border: 2px solid var(--neon-cyan);
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 4px;
    cursor: pointer;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
    transition: all 0.2s;
    text-shadow: 0 0 10px var(--neon-cyan);
    box-shadow: 0 0 15px rgba(0,245,255,0.2), inset 0 0 15px rgba(0,245,255,0.05);
  }

  .btn:hover {
    background: rgba(0,245,255,0.1);
    box-shadow: 0 0 30px rgba(0,245,255,0.4), inset 0 0 20px rgba(0,245,255,0.1);
    transform: scale(1.03);
  }

  .btn:active { transform: scale(0.97); }

  .controls-hint {
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(0,245,255,0.3);
    font-family: 'Share Tech Mono', monospace;
    text-align: center;
    line-height: 1.8;
  }

  @keyframes pulse-glow {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(0,245,255,0.5)); }
    50% { filter: drop-shadow(0 0 40px rgba(255,0,128,0.6)); }
  }

  .flash {
    position: absolute;
    top: 36px;
    width: 600px;
    height: 500px;
    background: rgba(255,0,128,0.15);
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.1s;
    clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
  }

  .flash.active { opacity: 1; }

  .mute-btn {
    position: absolute;
    top: 8px; right: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--neon-cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 4px 10px;
    cursor: pointer;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    transition: all 0.2s;
    z-index: 20;
  }
  .mute-btn:hover { background: rgba(0,245,255,0.1); }
  .mute-btn.muted { color: rgba(0,245,255,0.3); border-color: rgba(0,245,255,0.1); }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="scanline"></div>

<div class="wrapper">
  <div class="hud">
    <div class="hud-item">
      <div class="hud-label">SCORE</div>
      <div class="hud-value" id="scoreDisplay">000000</div>
    </div>
    <div class="hud-item" style="align-items:center">
      <div class="hud-label" style="text-align:center">LIVES</div>
      <div class="lives" id="livesDisplay">
        <span class="heart">♥</span>
        <span class="heart">♥</span>
        <span class="heart">♥</span>
      </div>
    </div>
    <div class="hud-item level-bar-wrap" style="align-items:flex-end">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value" id="levelDisplay">01</div>
      <div class="level-bar"><div class="level-bar-fill" id="levelBarFill" style="width:0%"></div></div>
    </div>
  </div>

  <div style="position:relative">
    <canvas id="gameCanvas" width="600" height="500"></canvas>
    <button class="mute-btn" id="muteBtn">🔊 SFX</button>
    <div class="flash" id="flash"></div>

    <div class="overlay" id="startScreen">
      <div class="overlay-title">VOID DASH</div>
      <div class="overlay-sub">AUSWEICHEN ODER STERBEN</div>
      <div class="btn" id="startBtn">STARTEN</div>
      <div class="controls-hint">
        MAUS BEWEGEN / PFEILTASTEN / WASD<br>
        3 LEBEN · SCHWIERIGKEIT STEIGT MIT DER ZEIT
      </div>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
      <div class="overlay-title" style="font-size:38px">GAME OVER</div>
      <div class="overlay-sub">SYSTEM FAILURE DETECTED</div>
      <div class="overlay-score" id="finalScore">0</div>
      <div class="overlay-sub" id="highScoreDisplay"></div>
      <div class="btn" id="restartBtn">RETRY</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
// SOUND ENGINE (Web Audio API — no files)
// ═══════════════════════════════════════
let audioCtx = null;
let muted = false;
let bgGain = null;
let bgStarted = false;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function resumeAudio() {
  const ctx = getAudioCtx();
  if (ctx.state === 'suspended') ctx.resume();
}

document.getElementById('muteBtn').onclick = () => {
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  btn.textContent = muted ? '🔇 SFX' : '🔊 SFX';
  btn.classList.toggle('muted', muted);
  if (bgGain) bgGain.gain.setTargetAtTime(muted ? 0 : 0.18, getAudioCtx().currentTime, 0.1);
};

// Ambient background drone
function startBgMusic() {
  if (bgStarted || muted) return;
  bgStarted = true;
  const ctx = getAudioCtx();
  bgGain = ctx.createGain();
  bgGain.gain.value = 0;
  bgGain.connect(ctx.destination);

  // Low rumble sub
  const sub = ctx.createOscillator();
  sub.type = 'sine';
  sub.frequency.value = 55;
  const subGain = ctx.createGain(); subGain.gain.value = 0.6;
  sub.connect(subGain); subGain.connect(bgGain);
  sub.start();

  // Mid drone
  const mid = ctx.createOscillator();
  mid.type = 'sawtooth';
  mid.frequency.value = 110;
  const midFilter = ctx.createBiquadFilter();
  midFilter.type = 'lowpass'; midFilter.frequency.value = 300;
  const midGain = ctx.createGain(); midGain.gain.value = 0.12;
  mid.connect(midFilter); midFilter.connect(midGain); midGain.connect(bgGain);
  mid.start();

  // Slow LFO pulse on sub
  const lfo = ctx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.25;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 8;
  lfo.connect(lfoGain); lfoGain.connect(sub.frequency);
  lfo.start();

  // Fade in
  bgGain.gain.setTargetAtTime(0.18, ctx.currentTime, 1.2);
}

function stopBgMusic() {
  if (bgGain) bgGain.gain.setTargetAtTime(0, getAudioCtx().currentTime, 0.3);
  bgStarted = false;
}

// One-shot synth hit
function playSound(type) {
  if (muted) return;
  const ctx = getAudioCtx();
  const master = ctx.createGain();
  master.connect(ctx.destination);
  const now = ctx.currentTime;

  if (type === 'hit') {
    // Distorted crunch
    const osc = ctx.createOscillator();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.18);
    const dist = ctx.createWaveShaper();
    const curve = new Float32Array(256);
    for(let i=0;i<256;i++) { const x=(i*2/256)-1; curve[i]=x<0?-1:1; }
    dist.curve = curve;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.5, now); g.gain.linearRampToValueAtTime(0, now+0.22);
    osc.connect(dist); dist.connect(g); g.connect(master);
    osc.start(now); osc.stop(now+0.22);

    // Low thud
    const thud = ctx.createOscillator();
    thud.type = 'sine'; thud.frequency.setValueAtTime(120, now);
    thud.frequency.exponentialRampToValueAtTime(30, now+0.15);
    const tg = ctx.createGain(); tg.gain.setValueAtTime(0.8, now); tg.gain.linearRampToValueAtTime(0, now+0.15);
    thud.connect(tg); tg.connect(master);
    thud.start(now); thud.stop(now+0.15);
    master.gain.value = 0.7;
  }

  else if (type === 'explosion') {
    // White noise burst
    const bufSize = ctx.sampleRate * 0.3;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1);
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=800; nf.Q.value=0.5;
    const ng = ctx.createGain(); ng.gain.setValueAtTime(1, now); ng.gain.exponentialRampToValueAtTime(0.001, now+0.3);
    noise.connect(nf); nf.connect(ng); ng.connect(master);
    noise.start(now);
    master.gain.value = 0.6;
  }

  else if (type === 'laser_warn') {
    // Rising beep
    const osc = ctx.createOscillator();
    osc.type = 'square'; osc.frequency.setValueAtTime(300, now);
    osc.frequency.linearRampToValueAtTime(600, now+0.4);
    const g = ctx.createGain(); g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0, now+0.4);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now+0.4);
    master.gain.value = 0.4;
  }

  else if (type === 'laser_fire') {
    // Sharp zap
    const osc = ctx.createOscillator();
    osc.type = 'square'; osc.frequency.setValueAtTime(1200, now);
    osc.frequency.exponentialRampToValueAtTime(80, now+0.12);
    const g = ctx.createGain(); g.gain.setValueAtTime(0.4, now); g.gain.linearRampToValueAtTime(0, now+0.12);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now+0.12);
    master.gain.value = 0.5;
  }

  else if (type === 'level_up') {
    // Ascending arpeggio
    const freqs = [261, 329, 392, 523, 659];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = ctx.createGain();
      const t = now + i*0.07;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.35, t+0.03);
      g.gain.linearRampToValueAtTime(0, t+0.13);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t+0.15);
    });
    master.gain.value = 0.5;
  }

  else if (type === 'game_over') {
    // Descending death chord
    const freqs = [220, 185, 155, 130, 110];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = 'sawtooth'; o.frequency.value = f;
      const filt = ctx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=600;
      const g = ctx.createGain();
      const t = now + i*0.12;
      g.gain.setValueAtTime(0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      o.connect(filt); filt.connect(g); g.connect(master);
      o.start(t); o.stop(t+0.55);
    });
    master.gain.value = 0.6;
  }

  else if (type === 'spawn') {
    // Short chirp
    const osc = ctx.createOscillator();
    osc.type = 'sine'; osc.frequency.setValueAtTime(800, now);
    osc.frequency.exponentialRampToValueAtTime(400, now+0.06);
    const g = ctx.createGain(); g.gain.setValueAtTime(0.12, now); g.gain.linearRampToValueAtTime(0, now+0.06);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now+0.07);
    master.gain.value = 0.3;
  }
}


const ctx = canvas.getContext('2d');

const W = canvas.width, H = canvas.height;

let state = 'idle'; // idle, playing, dead
let score = 0, lives = 3, level = 1;
let highScore = 0;
let frameCount = 0;
let particles = [];
let obstacles = [];
let stars = [];
let trailPoints = [];
let player = { x: W/2, y: H/2, r: 10, targetX: W/2, targetY: H/2 };
let keys = {};
let mouseX = W/2, mouseY = H/2;
let inputMode = 'mouse'; // mouse or keys
let invincible = false, invincibleTimer = 0;
let flashEl = document.getElementById('flash');
let levelProgress = 0;

// Generate background stars
for(let i=0;i<120;i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*0.3+0.1, alpha: Math.random() });
}

// --- Obstacle types ---
const COLORS = ['#00f5ff','#ff0080','#ffff00','#00ff88','#ff6600','#a855f7'];

function spawnObstacle() {
  const speed = 2 + level * 0.7 + Math.random() * 1.5;
  const type = Math.random();
  let o = {};

  if(type < 0.4) {
    // Incoming from edge
    const side = Math.floor(Math.random()*4);
    let x,y,vx,vy;
    if(side===0){x=Math.random()*W;y=-20;vx=(Math.random()-0.5)*2;vy=speed;}
    else if(side===1){x=W+20;y=Math.random()*H;vx=-speed;vy=(Math.random()-0.5)*2;}
    else if(side===2){x=Math.random()*W;y=H+20;vx=(Math.random()-0.5)*2;vy=-speed;}
    else{x=-20;y=Math.random()*H;vx=speed;vy=(Math.random()-0.5)*2;}
    o = { type:'square', x, y, vx, vy, w:18, h:18, rot:0, rotSpeed:(Math.random()-0.5)*0.15, color: COLORS[Math.floor(Math.random()*COLORS.length)] };
  } else if(type < 0.65) {
    // Homing
    const side = Math.floor(Math.random()*4);
    let x,y;
    if(side===0){x=Math.random()*W;y=-20;}
    else if(side===1){x=W+20;y=Math.random()*H;}
    else if(side===2){x=Math.random()*W;y=H+20;}
    else{x=-20;y=Math.random()*H;}
    o = { type:'homing', x, y, vx:0, vy:0, speed: speed*0.6, r:10, color:'#ff0080', pulseT:0 };
  } else if(type < 0.82) {
    // Laser beam horizontal or vertical
    const horiz = Math.random()<0.5;
    const pos = Math.random()*(horiz?H:W);
    o = { type:'laser', horiz, pos: horiz?-H*0.1:pos, target: horiz?pos:pos, life:0, maxLife:90+Math.floor(Math.random()*60), phase:'warn', warnTime:40, color:'#ffff00' };
  } else {
    // Spiral projectile
    const cx = W/2+( Math.random()-0.5)*100, cy=H/2+(Math.random()-0.5)*100;
    const ang = Math.random()*Math.PI*2;
    o = { type:'spiral', x: cx, y: cy, angle: ang, radius:0, speed: speed*0.8, growRate:1.5, color:'#00ff88' };
  }
  obstacles.push(o);
}

function spawnParticles(x, y, count, color, explode=false) {
  for(let i=0;i<count;i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = explode ? Math.random()*6+2 : Math.random()*3+1;
    particles.push({
      x, y,
      vx: Math.cos(ang)*spd,
      vy: Math.sin(ang)*spd,
      life: 1,
      decay: Math.random()*0.04+0.02,
      r: Math.random()*3+1,
      color
    });
  }
}

function triggerFlash() {
  flashEl.classList.add('active');
  setTimeout(()=>flashEl.classList.remove('active'),120);
}

function updateLivesHUD() {
  const hearts = document.querySelectorAll('.heart');
  hearts.forEach((h,i) => h.classList.toggle('dead', i >= lives));
}

function updateScoreHUD() {
  document.getElementById('scoreDisplay').textContent = String(score).padStart(6,'0');
}

function updateLevelHUD() {
  document.getElementById('levelDisplay').textContent = String(level).padStart(2,'0');
  document.getElementById('levelBarFill').style.width = (levelProgress*100)+'%';
}

function hitPlayer() {
  if(invincible) return;
  lives--;
  updateLivesHUD();
  triggerFlash();
  playSound('hit');
  spawnParticles(player.x, player.y, 30, '#ff0080', true);
  invincible = true; invincibleTimer = 120;
  if(lives<=0) endGame();
}

function endGame() {
  state = 'dead';
  playSound('game_over');
  stopBgMusic();
  if(score>highScore) highScore=score;
  document.getElementById('finalScore').textContent = 'SCORE: '+String(score).padStart(6,'0');
  document.getElementById('highScoreDisplay').textContent = highScore>0?'BEST: '+String(highScore).padStart(6,'0'):'';
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function startGame() {
  score=0; lives=3; level=1; frameCount=0; levelProgress=0;
  obstacles=[]; particles=[]; trailPoints=[];
  player = { x:W/2, y:H/2, r:10, targetX:W/2, targetY:H/2 };
  invincible=false; invincibleTimer=0;
  updateLivesHUD(); updateScoreHUD(); updateLevelHUD();
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  state = 'playing';
  bgStarted = false;
  startBgMusic();
}

document.getElementById('startBtn').onclick = () => { resumeAudio(); startGame(); };
document.getElementById('restartBtn').onclick = () => { resumeAudio(); startGame(); };

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
  inputMode = 'mouse';
});

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d'].includes(e.key)) inputMode = 'keys';
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

function collides(p, o) {
  if(o.type==='square') {
    // AABB approx
    const dx = p.x - o.x, dy = p.y - o.y;
    return Math.abs(dx)<o.w/2+p.r && Math.abs(dy)<o.h/2+p.r;
  }
  if(o.type==='homing') {
    const dx=p.x-o.x, dy=p.y-o.y;
    return Math.sqrt(dx*dx+dy*dy) < o.r+p.r;
  }
  if(o.type==='laser') {
    if(o.phase!=='active') return false;
    if(o.horiz) return Math.abs(p.y - o.target)<12+p.r;
    else return Math.abs(p.x - o.target)<12+p.r;
  }
  if(o.type==='spiral') {
    const dx=p.x-o.x, dy=p.y-o.y;
    return Math.sqrt(dx*dx+dy*dy) < 8+p.r;
  }
  return false;
}

function update() {
  if(state!=='playing') return;
  frameCount++;
  score += 1;
  levelProgress += 0.001;

  if(levelProgress>=1) {
    levelProgress=0;
    level++;
    playSound('level_up');
    // Speed up bg drone slightly
    if(bgGain && audioCtx) {
      const sub = audioCtx.createOscillator(); // just bump pitch via lfo — handled via existing nodes
    }
  }
  level = Math.min(level, 15);
  updateScoreHUD(); updateLevelHUD();

  // Spawn
  const spawnRate = Math.max(8, 50 - level*3);
  if(frameCount % spawnRate === 0) { spawnObstacle(); playSound('spawn'); }

  // Player movement
  const spd = 5;
  if(inputMode==='keys') {
    if(keys['ArrowLeft']||keys['a']) player.targetX = Math.max(player.r, player.targetX-spd);
    if(keys['ArrowRight']||keys['d']) player.targetX = Math.min(W-player.r, player.targetX+spd);
    if(keys['ArrowUp']||keys['w']) player.targetY = Math.max(player.r, player.targetY-spd);
    if(keys['ArrowDown']||keys['s']) player.targetY = Math.min(H-player.r, player.targetY+spd);
  } else {
    player.targetX = Math.max(player.r, Math.min(W-player.r, mouseX));
    player.targetY = Math.max(player.r, Math.min(H-player.r, mouseY));
  }
  player.x += (player.targetX - player.x) * 0.18;
  player.y += (player.targetY - player.y) * 0.18;

  // Trail
  trailPoints.unshift({x:player.x, y:player.y, life:1});
  if(trailPoints.length>20) trailPoints.pop();
  trailPoints.forEach(t=>t.life-=0.05);

  // Invincibility
  if(invincible) { invincibleTimer--; if(invincibleTimer<=0) invincible=false; }

  // Obstacles
  obstacles = obstacles.filter(o => {
    // Update
    if(o.type==='square') {
      o.x+=o.vx; o.y+=o.vy; o.rot+=o.rotSpeed;
      return o.x>-50 && o.x<W+50 && o.y>-50 && o.y<H+50;
    }
    if(o.type==='homing') {
      const dx=player.x-o.x, dy=player.y-o.y;
      const d=Math.sqrt(dx*dx+dy*dy)||1;
      o.vx += (dx/d)*o.speed*0.1; o.vy += (dy/d)*o.speed*0.1;
      const spd=Math.sqrt(o.vx*o.vx+o.vy*o.vy);
      if(spd>o.speed){o.vx=o.vx/spd*o.speed;o.vy=o.vy/spd*o.speed;}
      o.x+=o.vx; o.y+=o.vy; o.pulseT+=0.1;
      return o.x>-30 && o.x<W+30 && o.y>-30 && o.y<H+30;
    }
    if(o.type==='laser') {
      o.life++;
      const prevPhase = o.phase;
      if(o.life<o.warnTime) o.phase='warn';
      else if(o.life<o.warnTime+20) o.phase='active';
      else if(o.life<o.maxLife) o.phase='fade';
      else return false;
      if(prevPhase!==o.phase && o.phase==='warn') playSound('laser_warn');
      if(prevPhase!==o.phase && o.phase==='active') playSound('laser_fire');
      return true;
    }
    if(o.type==='spiral') {
      o.radius += o.growRate;
      o.angle += 0.12;
      o.x = o.x; // stays at center
      return o.radius < Math.sqrt(W*W+H*H);
    }
    return false;
  });

  // Collision
  for(const o of obstacles) {
    if(collides(player, o)) {
      hitPlayer();
      if(o.type!=='laser') {
        spawnParticles(o.x||player.x, o.y||player.y, 15, o.color, true);
        playSound('explosion');
        obstacles.splice(obstacles.indexOf(o),1);
        break;
      }
    }
  }

  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay;
    return p.life>0;
  });
}

function drawGlow(x,y,r,color,intensity=1) {
  const g = ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0, color.replace(')',`, ${0.6*intensity})`).replace('rgb','rgba').replace('#','rgba('+parseInt(color.slice(1,3),16)+','+parseInt(color.slice(3,5),16)+','+parseInt(color.slice(5,7),16)+','));
  // simpler approach:
  ctx.save();
  ctx.globalAlpha = 0.3*intensity;
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = r*2;
  ctx.beginPath(); ctx.arc(x,y,r*0.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#020408';
  ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if(s.y>H) { s.y=-5; s.x=Math.random()*W; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,245,255,${s.alpha*0.5})`;
    ctx.fill();
  });

  // Trail
  if(state==='playing') {
    trailPoints.forEach((t,i) => {
      if(t.life<=0) return;
      const r = player.r * (t.life) * 0.7;
      ctx.save();
      ctx.globalAlpha = t.life*0.4;
      ctx.fillStyle = i%2===0?'#00f5ff':'#ff0080';
      ctx.shadowColor = '#00f5ff';
      ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  }

  // Obstacles
  obstacles.forEach(o => {
    ctx.save();
    if(o.type==='square') {
      ctx.translate(o.x, o.y);
      ctx.rotate(o.rot);
      ctx.shadowColor = o.color;
      ctx.shadowBlur = 15;
      ctx.strokeStyle = o.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(-o.w/2, -o.h/2, o.w, o.h);
      ctx.globalAlpha = 0.2;
      ctx.fillStyle = o.color;
      ctx.fillRect(-o.w/2, -o.h/2, o.w, o.h);
    }
    else if(o.type==='homing') {
      const pulse = Math.sin(o.pulseT)*3;
      ctx.shadowColor = '#ff0080';
      ctx.shadowBlur = 20+pulse*5;
      ctx.strokeStyle = '#ff0080';
      ctx.lineWidth = 2;
      ctx.beginPath();
      // Diamond shape
      ctx.moveTo(o.x, o.y-o.r-pulse);
      ctx.lineTo(o.x+o.r+pulse, o.y);
      ctx.lineTo(o.x, o.y+o.r+pulse);
      ctx.lineTo(o.x-o.r-pulse, o.y);
      ctx.closePath();
      ctx.stroke();
      ctx.globalAlpha=0.15; ctx.fillStyle='#ff0080'; ctx.fill();
    }
    else if(o.type==='laser') {
      const alpha = o.phase==='warn' ? (o.life/o.warnTime)*0.4 :
                    o.phase==='active' ? 0.9 :
                    (1-(o.life-o.warnTime-20)/(o.maxLife-o.warnTime-20))*0.7;
      ctx.globalAlpha = alpha;
      ctx.shadowColor = o.color;
      ctx.shadowBlur = o.phase==='active'?25:10;
      ctx.strokeStyle = o.color;
      ctx.lineWidth = o.phase==='active'?4:2;
      ctx.setLineDash(o.phase==='warn'?[8,6]:[]);
      ctx.beginPath();
      if(o.horiz) { ctx.moveTo(0,o.target); ctx.lineTo(W,o.target); }
      else { ctx.moveTo(o.target,0); ctx.lineTo(o.target,H); }
      ctx.stroke();
      ctx.setLineDash([]);
    }
    else if(o.type==='spiral') {
      const sx = o.x + Math.cos(o.angle)*o.radius;
      const sy = o.y + Math.sin(o.angle)*o.radius;
      if(sx>-20&&sx<W+20&&sy>-20&&sy<H+20) {
        ctx.shadowColor = o.color;
        ctx.shadowBlur = 12;
        ctx.fillStyle = o.color;
        ctx.beginPath(); ctx.arc(sx, sy, 7, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha=0.2; ctx.beginPath(); ctx.arc(sx,sy,14,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Player
  if(state==='playing') {
    const blink = invincible && Math.floor(frameCount/6)%2===0;
    if(!blink) {
      ctx.save();
      // Outer glow
      ctx.shadowColor = '#00f5ff';
      ctx.shadowBlur = 25;
      ctx.strokeStyle = '#00f5ff';
      ctx.lineWidth = 2;
      // Hexagon
      ctx.beginPath();
      for(let i=0;i<6;i++) {
        const ang = (i/6)*Math.PI*2 - Math.PI/6;
        const x2=player.x+Math.cos(ang)*player.r, y2=player.y+Math.sin(ang)*player.r;
        i===0?ctx.moveTo(x2,y2):ctx.lineTo(x2,y2);
      }
      ctx.closePath(); ctx.stroke();
      ctx.globalAlpha=0.2; ctx.fillStyle='#00f5ff'; ctx.fill();

      // Inner dot
      ctx.globalAlpha=1;
      ctx.fillStyle='#ffffff';
      ctx.shadowBlur=10;
      ctx.beginPath(); ctx.arc(player.x, player.y, 2.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
