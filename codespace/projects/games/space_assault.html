
<style>
*{margin:0;padding:0;box-sizing:border-box}
#gw{position:relative;width:100%;font-family:monospace;background:#000}
canvas{display:block;width:100%;background:#000}
#hud{position:absolute;top:0;left:0;width:100%;pointer-events:none}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:rgba(0,10,20,0.75);border-bottom:1px solid #0af3}
.hud-block{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-label{font-size:10px;color:#0af8;letter-spacing:2px;text-transform:uppercase}
.hud-value{font-size:18px;color:#0affcc;font-weight:700}
#healthbar-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
#healthbar{width:120px;height:8px;background:#0a2a1a;border:1px solid #0af5;border-radius:2px;overflow:hidden}
#healthfill{height:100%;width:100%;background:#00ffaa;transition:width 0.2s;border-radius:2px}
#wavebanner{position:absolute;left:50%;transform:translateX(-50%);top:60px;background:rgba(0,10,25,0.92);border:1px solid #0af6;padding:10px 32px;color:#00ffcc;font-size:20px;letter-spacing:4px;display:none;pointer-events:none}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,12,0.88)}
#overlay h2{color:#00ffcc;font-size:24px;letter-spacing:4px;margin-bottom:8px}
.ovr-sub{color:#66ffdd;font-size:12px;letter-spacing:2px;margin-bottom:4px}
.ovr-ctrl{color:#448866;font-size:11px;margin-bottom:3px}
#startBtn{margin-top:20px;padding:10px 36px;background:transparent;border:1px solid #00ffcc;color:#00ffcc;font-family:monospace;font-size:14px;cursor:pointer;letter-spacing:3px}
#startBtn:hover{background:#00ffcc18}
#killstreak{position:absolute;right:14px;top:60px;color:#ffaa00;font-size:12px;letter-spacing:2px;pointer-events:none;opacity:0;transition:opacity 0.3s}
</style>
<div id="gw">
  <canvas id="c"></canvas>
  <div id="hud">
    <div id="topbar">
      <div class="hud-block"><span class="hud-label">score</span><span class="hud-value" id="scoreEl">0</span></div>
      <div class="hud-block" id="healthbar-wrap"><span class="hud-label">shield</span><div id="healthbar"><div id="healthfill"></div></div></div>
      <div class="hud-block"><span class="hud-label">wave</span><span class="hud-value" id="waveEl">1</span></div>
      <div class="hud-block"><span class="hud-label">lives</span><span class="hud-value" id="livesEl">3</span></div>
    </div>
    <div id="wavebanner" id="wbanner">WAVE CLEAR</div>
    <div id="killstreak" id="kstreak"></div>
  </div>
  <div id="overlay">
    <h2>VOID ASSAULT</h2>
    <div style="margin:14px 0 6px;border-top:1px solid #0af4;width:180px"></div>
    <p class="ovr-ctrl">Arrow keys / WASD — move</p>
    <p class="ovr-ctrl">SPACE — fire</p>
    <p class="ovr-ctrl">Destroy all enemies to advance</p>
    <button id="startBtn">LAUNCH</button>
  </div>
</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const gw=document.getElementById('gw');
const scoreEl=document.getElementById('scoreEl'),waveEl=document.getElementById('waveEl'),livesEl=document.getElementById('livesEl');
const healthfill=document.getElementById('healthfill');
const wavebanner=document.getElementById('wavebanner');
const killstreakEl=document.getElementById('killstreak');
const overlay=document.getElementById('overlay');
const startBtn=document.getElementById('startBtn');

const PLAYER_START_X_RATIO=0.5, PLAYER_START_Y_OFFSET=60;

let W,H,player,bullets,enemies,particles,stars,score,lives,wave,running,keys,shootCooldown,enemyBullets,health,maxHealth,kills,killstreakCount,killstreakTimer,waveTransition;
let audioCtx=null;

function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

function playTone(freq,type,dur,vol=0.3,detune=0){
  try{
    const ac=getAudio();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type;o.frequency.value=freq;o.detune.value=detune;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}

function soundShoot(){playTone(880,'sawtooth',0.07,0.15);playTone(660,'square',0.05,0.08);}
function soundHit(){playTone(200,'sawtooth',0.12,0.3);playTone(120,'square',0.1,0.2);}
function soundExplode(){playTone(80,'sawtooth',0.25,0.4);playTone(50,'square',0.3,0.3,200);}
function soundWaveClear(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.3,0.25),i*120));}
function soundGameOver(){[400,300,200,100].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.4,0.3),i*150));}
function soundLevelUp(){[440,550,660,880].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.2,0.2),i*80));}

function resize(){
  const cw=gw.clientWidth||600;
  canvas.width=cw;canvas.height=Math.min(cw*0.62,430);
  W=canvas.width;H=canvas.height;
}

function init(){
  resize();W=canvas.width;H=canvas.height;
  score=0;lives=3;wave=1;running=true;keys={};shootCooldown=0;health=100;maxHealth=100;kills=0;killstreakCount=0;killstreakTimer=0;waveTransition=false;
  player={x:W*PLAYER_START_X_RATIO,y:H-PLAYER_START_Y_OFFSET,w:28,h:22,speed:4.5,invincible:0,thruster:0};
  bullets=[];enemies=[];particles=[];enemyBullets=[];
  stars=Array.from({length:90},()=>({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.6+0.3,v:Math.random()*0.9+0.2}));
  spawnWave();updateUI();
}

function resetPlayerPosition(){
  player.x=W*PLAYER_START_X_RATIO;
  player.y=H-PLAYER_START_Y_OFFSET;
  player.invincible=120;
  spawnParticles(player.x,player.y,'#00ffcc',10);
}

function spawnWave(){
  waveEl.textContent=wave;
  const cols=Math.min(4+wave,10),rows=Math.min(2+Math.floor(wave/2),5);
  const ex=(W-cols*44)/2;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      enemies.push({x:ex+c*44,y:30+r*38,w:26,h:18,hp:r===0?2:1,maxHp:r===0?2:1,type:r===0?1:0,shootTimer:Math.random()*180+60,dx:(Math.random()<0.5?1:-1)*0.4});
    }
  }
}

function showWaveBanner(txt,color='#00ffcc'){
  wavebanner.textContent=txt;wavebanner.style.color=color;wavebanner.style.display='block';
  setTimeout(()=>wavebanner.style.display='none',1800);
}

function showKillstreak(n){
  killstreakEl.textContent= n>=10?'ANNIHILATOR x'+n: n>=5?'RAMPAGE x'+n: 'MULTI-KILL x'+n;
  killstreakEl.style.opacity='1';
  clearTimeout(killstreakEl._t);
  killstreakEl._t=setTimeout(()=>killstreakEl.style.opacity='0',1200);
}

function updateUI(){
  scoreEl.textContent=score;
  livesEl.textContent=lives;
  healthfill.style.width=Math.max(0,health)+'%';
  healthfill.style.background=health>50?'#00ffaa':health>25?'#ffaa00':'#ff3344';
}

function spawnParticles(x,y,color,n=8){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*3.5+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:35+Math.random()*20,color});}
}

function drawPlayer(){
  const {x,y,invincible}=player;
  if(invincible>0 && Math.floor(invincible/6)%2===0) return;
  ctx.save();ctx.translate(x,y);
  const c='#00ffcc';
  ctx.strokeStyle=c;ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,-13);ctx.lineTo(14,12);ctx.lineTo(6,7);ctx.lineTo(-6,7);ctx.lineTo(-14,12);ctx.closePath();
  ctx.fillStyle='#00ffcc12';ctx.fill();ctx.stroke();
  ctx.strokeStyle='#00ffcc88';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-4,-2);ctx.lineTo(-6,7);ctx.moveTo(4,-2);ctx.lineTo(6,7);ctx.stroke();
  ctx.beginPath();ctx.moveTo(-2,8);ctx.lineTo(-2,8+6+Math.random()*4);ctx.moveTo(2,8);ctx.lineTo(2,8+5+Math.random()*4);
  ctx.strokeStyle='#00ccff99';ctx.lineWidth=2;ctx.stroke();
  ctx.strokeStyle='#ff880066';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(-10,5);ctx.lineTo(-16,10);ctx.moveTo(10,5);ctx.lineTo(16,10);ctx.stroke();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();ctx.translate(e.x+e.w/2,e.y+e.h/2);
  const prim=e.type===1?'#ff6622':'#aa44ff';
  const sec=e.type===1?'#ff440044':'#8822ff33';
  ctx.strokeStyle=prim;ctx.fillStyle=sec;ctx.lineWidth=1.3;
  ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(13,5);ctx.lineTo(8,10);ctx.lineTo(-8,10);ctx.lineTo(-13,5);ctx.closePath();
  ctx.fill();ctx.stroke();
  ctx.strokeStyle=prim+'88';ctx.lineWidth=0.8;
  ctx.beginPath();ctx.moveTo(-5,0);ctx.lineTo(-10,-5);ctx.moveTo(5,0);ctx.lineTo(10,-5);ctx.stroke();
  ctx.fillStyle=prim;ctx.beginPath();ctx.arc(0,-2,2.5,0,Math.PI*2);ctx.fill();
  if(e.type===1){
    ctx.strokeStyle='#ffaa0099';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-13,5);ctx.lineTo(-18,8);ctx.moveTo(13,5);ctx.lineTo(18,8);ctx.stroke();
  }
  ctx.restore();
}

function drawBullet(b){
  ctx.save();
  ctx.fillStyle=b.color;
  const len=b.vy<0?12:8;
  ctx.beginPath();ctx.roundRect(b.x-1.5,b.y-len/2,3,len,2);ctx.fill();
  ctx.restore();
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function loop(){
  if(!running)return;
  W=canvas.width;H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000010';ctx.fillRect(0,0,W,H);

  stars.forEach(s=>{
    s.y+=s.v;if(s.y>H){s.y=0;s.x=Math.random()*W;}
    ctx.fillStyle=`rgba(160,210,255,${0.25+s.s*0.25})`;ctx.fillRect(s.x,s.y,s.s,s.s);
  });

  ctx.fillStyle='rgba(0,50,120,0.04)';
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(W/2,H/2,100+i*80,0,Math.PI*2);ctx.fill();}

  if(!waveTransition){
    if(keys['ArrowLeft']||keys['KeyA'])player.x=Math.max(player.w/2,player.x-player.speed);
    if(keys['ArrowRight']||keys['KeyD'])player.x=Math.min(W-player.w/2,player.x+player.speed);
    if(keys['ArrowUp']||keys['KeyW'])player.y=Math.max(H*0.35,player.y-player.speed);
    if(keys['ArrowDown']||keys['KeyS'])player.y=Math.min(H-20,player.y+player.speed);
    shootCooldown--;
    if(keys['Space']&&shootCooldown<=0){
      bullets.push({x:player.x,y:player.y-14,vy:-10,color:'#00ffcc'});
      bullets.push({x:player.x-8,y:player.y-5,vy:-9.5,color:'#00aaff88'});
      bullets.push({x:player.x+8,y:player.y-5,vy:-9.5,color:'#00aaff88'});
      shootCooldown=10;soundShoot();
    }
    if(player.invincible>0)player.invincible--;
  }

  bullets=bullets.filter(b=>{
    b.y+=b.vy;if(b.y<-10)return false;
    drawBullet(b);return true;
  });

  enemyBullets=enemyBullets.filter(b=>{
    b.y+=b.vy;if(b.y>H+10)return false;
    ctx.fillStyle='#ff4455';
    ctx.beginPath();ctx.roundRect(b.x-1.5,b.y-5,3,10,2);ctx.fill();
    if(!waveTransition&&player.invincible<=0){
      const dx=b.x-player.x,dy=b.y-player.y;
      if(Math.abs(dx)<14&&Math.abs(dy)<13){
        health-=18;spawnParticles(player.x,player.y,'#ff4455',6);soundHit();
        if(health<=0){lives--;health=maxHealth;if(lives<=0){gameOver(false);return false;}else{resetPlayerPosition();}}
        updateUI();return false;
      }
    }
    return true;
  });

  enemies.forEach(e=>{
    e.x+=e.dx;
    if(e.x<0||e.x+e.w>W)e.dx*=-1;
    e.shootTimer--;
    if(e.shootTimer<=0&&!waveTransition){
      enemyBullets.push({x:e.x+e.w/2,y:e.y+e.h,vy:2.5+wave*0.25});
      e.shootTimer=70+Math.random()*100-wave*4;
      if(e.shootTimer<25)e.shootTimer=25;
    }
    drawEnemy(e);
  });

  for(let i=bullets.length-1;i>=0;i--){
    for(let j=enemies.length-1;j>=0;j--){
      const b=bullets[i],e=enemies[j];
      if(b&&b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){
        e.hp--;bullets.splice(i,1);
        if(e.hp<=0){
          spawnParticles(e.x+e.w/2,e.y+e.h/2,e.type===1?'#ff6622':'#aa44ff',10);
          enemies.splice(j,1);score+=e.type===1?20:10;kills++;killstreakCount++;
          if(killstreakCount>=3)showKillstreak(killstreakCount);
          clearTimeout(killstreakEl._reset);
          killstreakEl._reset=setTimeout(()=>killstreakCount=0,2000);
          soundExplode();updateUI();
        }break;
      }
    }
  }

  enemies.forEach(e=>{
    if(!waveTransition&&player.invincible<=0&&e.y+e.h>player.y-12){lives=0;gameOver(false);}
  });

  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=0.91;p.vy*=0.91;
    ctx.globalAlpha=p.life/55;ctx.fillStyle=p.color;ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
    ctx.globalAlpha=1;return p.life>0;
  });

  drawPlayer();

  if(enemies.length===0&&!waveTransition){
    waveTransition=true;enemyBullets=[];
    soundWaveClear();showWaveBanner('WAVE '+wave+' CLEAR','#00ffcc');
    setTimeout(()=>{
      wave++;spawnWave();resetPlayerPosition();
      showWaveBanner('WAVE '+wave,'#ffcc00');
      soundLevelUp();
      setTimeout(()=>{waveTransition=false;},1000);
    },1800);
  }

  ctx.save();
  ctx.strokeStyle='#00ffcc22';ctx.lineWidth=0.5;
  ctx.strokeRect(0,0,W,H);
  ctx.strokeStyle='#00ffcc44';ctx.lineWidth=0.8;
  for(let i=0;i<4;i++){
    const l=6,x=i<2?8:W-8,y=i%2===0?8:H-8;
    const sx=i<2?1:-1,sy=i%2===0?1:-1;
    ctx.beginPath();ctx.moveTo(x,y+sy*l);ctx.lineTo(x,y);ctx.lineTo(x+sx*l,y);ctx.stroke();
  }
  ctx.restore();

  requestAnimationFrame(loop);
}

function gameOver(win){
  running=false;
  const h2=overlay.querySelector('h2');
  const subs=overlay.querySelectorAll('.ovr-sub,.ovr-ctrl');
  subs.forEach(e=>e.remove());
  h2.textContent=win?'MISSION COMPLETE':'HULL BREACH';
  h2.style.color=win?'#00ffcc':'#ff3355';
  const s1=document.createElement('p');s1.className='ovr-sub';s1.textContent='SCORE: '+score;
  const s2=document.createElement('p');s2.className='ovr-sub';s2.textContent='WAVES: '+wave+' | KILLS: '+kills;
  h2.after(s1);s1.after(s2);
  startBtn.textContent='RETRY';
  overlay.style.display='flex';
  if(!win)soundGameOver();
}

startBtn.addEventListener('click',()=>{
  overlay.style.display='none';
  init();loop();
});
</script>
