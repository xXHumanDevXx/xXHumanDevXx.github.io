<!DOCTYPE html><html lang="de"><head>  <meta charset="UTF-8"/>  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  <title>VoidDash</title>  <style>    * { box-sizing: border-box; margin: 0; padding: 0; }    body {      min-height: 100vh;      background: #0d0d14;      display: flex;      align-items: center;      justify-content: center;      font-family: 'Segoe UI', sans-serif;    }    .cards {      display: flex;      gap: 24px;      flex-wrap: wrap;      justify-content: center;      padding: 2rem;    }    .card {      background: #16161f;      border: 1px solid #2a2a3d;      border-radius: 16px;      width: 180px;      padding: 2rem 1.5rem;      display: flex;      flex-direction: column;      align-items: center;      gap: 1.25rem;      transition: border-color 0.3s, transform 0.3s;    }    .card:hover {      border-color: #7c6fcd;      transform: translateY(-4px);    }    .card-title {      font-size: 1.1rem;      font-weight: 600;      color: #e8e6f0;      letter-spacing: 0.05em;    }    /* ── Animated Button ── */    .btn {      position: relative;      width: 100%;      padding: 0.65rem 0;      background: transparent;      border: 1px solid #7c6fcd;      border-radius: 8px;      color: #c8a96e;      font-size: 0.85rem;      font-weight: 600;      letter-spacing: 0.1em;      cursor: pointer;      overflow: hidden;      transition: color 0.3s;    }    /* Ripple fill on hover */    .btn::before {      content: '';      position: absolute;      top: 50%; left: 50%;      width: 0; height: 0;      background: #7c6fcd;      border-radius: 50%;      transform: translate(-50%, -50%);      transition: width 0.45s ease, height 0.45s ease, opacity 0.45s ease;      opacity: 0;      z-index: 0;    }    .btn:hover::before {      width: 300px;      height: 300px;      opacity: 1;    }    .btn:hover { color: #fff; border-color: #7c6fcd; }    .btn span {      position: relative;      z-index: 1;    }    /* Click pulse */    .btn:active { transform: scale(0.96); }    /* Shimmer line */    .btn::after {      content: '';      position: absolute;      top: 0; left: -100%;      width: 60%; height: 100%;      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);      transform: skewX(-20deg);      transition: none;      z-index: 2;    }    .btn:hover::after {      animation: shimmer 0.6s ease forwards;    }    @keyframes shimmer {      0%   { left: -100%; }      100% { left: 160%; }    }  </style></head><body>  <div class="cards">    <div class="card">      <span class="card-title">VoidDash</span>      <button class="btn"><span>Spielen</span></button>    </div>    <div class="card">      <span class="card-title">VoidDash</span>      <button class="btn"><span>Spielen</span></button>    </div>    <div class="card">      <span class="card-title">VoidDash</span>      <button class="btn"><span>Spielen</span></button>    </div>  </div></body></html>
