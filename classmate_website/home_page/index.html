

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title> Enter Game Area </title>

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      background: transparent; /* 🔥 kein Hintergrund */
      font-family: 'Segoe UI', sans-serif;
    }

    .btn {
      position: relative;
      padding: 0.65rem 2rem;
      background: transparent;
      border: 1px solid #7c6fcd;
      border-radius: 8px;
      color: #c8a96e;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      overflow: hidden;
      transition: color 0.3s;

      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 0; height: 0;
      background: #7c6fcd;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: 0.45s ease;
      opacity: 0;
      z-index: 0;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
      opacity: 1;
    }

    .btn:hover {
      color: #fff;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      z-index: 2;
    }

    .btn:hover::after {
      animation: shimmer 0.6s ease forwards;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 160%; }
    }
  </style>
</head>

<body>

  <a href="spiel1.html" class="btn">
    <span>Spielen</span>
  </a>

</body>
</html>
